# GreptimeDB standalone configuration.
#
# Mounted read-only into the container at /etc/greptimedb/config.toml.
#
# NO SECRETS IN THIS FILE. R2 credentials are injected at runtime as
# environment variables, which GreptimeDB merges over this file:
#
#   GREPTIMEDB_STANDALONE__STORAGE__ACCESS_KEY_ID
#   GREPTIMEDB_STANDALONE__STORAGE__SECRET_ACCESS_KEY
#
# Format is GREPTIMEDB_STANDALONE__<SECTION>__<KEY>, double underscore between
# levels. See .env.example.

# Metadata, WAL and local caches live on the mounted volume, not in R2.
#
# WARNING: this key is IGNORED by v1.1.3. The startup options dump shows
# `data_home: "./greptimedb_data"` regardless of what is set here. data_home is
# passed via the --data-home CLI flag in docker-compose.yml instead; that is the
# only form that takes effect. Left here for documentation only — do not rely
# on it, and do not remove the CLI flag.
data_home = "/data/home"

[storage]
type = "S3"
bucket = "ohlcv"
root = "/data"
endpoint = "https://1c0536c91a38db1b8f5607f69c452b27.r2.cloudflarestorage.com"
# R2 has no regions, but the S3 client requires the field set.
region = "auto"

# Storage-level read cache.
#
# INERT ON v1.1.3: /data/read_cache is never created and this capacity is never
# used — mito's write cache below is the unified read+write cache in this
# version (see enable_refill_cache_on_read). Kept, deliberately sized SMALL,
# because a future release that starts honouring it must not be free to fill
# the disk: only ~85 GB is actually free on this host, not the 300 GB the
# device size suggests. Tune write_cache_size below, not this.
cache_path = "/data/read_cache"
cache_capacity = "20GiB"

[storage.http_client]
pool_max_idle_per_host = 1024
# 10s: Cloudflare edge routing can make the initial TLS handshake slow
# depending on geography. 5s produced spurious connect failures.
connect_timeout = "10s"
# 120s: a large chunk pull from R2, or a fetch competing with local decompression
# for CPU, can legitimately exceed 60s. The old 60s cap was killing healthy but
# slow downloads and surfacing as reqwest::Error.
timeout = "120s"

[wal]
provider = "raft_engine"
dir = "/data/home/wal"
# false = ack writes before fsync. Faster, but a host crash can lose the last
# few writes. Set true if that is unacceptable.
sync_write = false

[[region_engine]]
[region_engine.mito]
# 16 vCPU host. Workers handle writes/flush; background jobs handle compaction.
num_workers = 8
max_background_jobs = 8

# Write cache: newly flushed SSTs stay on local disk instead of being re-read
# from R2 on the next query.
enable_write_cache = true
write_cache_path = "/data/write_cache"
# THE performance knob. This is the unified local read+write cache in v1.1.3 —
# the storage-level cache_capacity above does nothing. Every byte not resident
# here costs an HTTPS round trip to Cloudflare R2 on read.
#
# Total dataset in R2 is ~30 GiB, so the previous 20GiB structurally could not
# hold it and ~1/3 of reads always missed to R2. 80GiB holds the entire dataset
# resident with years of headroom for market-data growth.
#
# Ceiling is disk, not ambition: / is 301 G with ~190 G free after the
# 2026-07-22 cleanup (reclaimed ~108 GB of stale buildkit cache, an orphaned
# registry volume and dead greptime volumes). This is a SHARED host — other
# stacks grow into the same filesystem — so this deliberately leaves ~110 G
# free rather than claiming everything available.
write_cache_size = "80GiB"
enable_refill_cache_on_read = true

# In-memory caches — avoid re-decoding parquet pages on repeat reads.
#
# RAM budget on a 32 GB host. These are additive and this process is not the
# only consumer:
#   page 6 + content 3 + write buffer 2 + vector/selector/meta/index ~1.75
#   = ~12.75 GiB steady state, ~19 GB left for OS page cache, query working
#   memory and burst. Raise page_cache_size first if queries are read-heavy.
sst_meta_cache_size = "256MiB"
vector_cache_size = "512MiB"
page_cache_size = "6GiB"
selector_result_cache_size = "512MiB"

# Reject writes before the host OOMs rather than after.
global_write_buffer_size = "2GiB"
global_write_buffer_reject_size = "4GiB"

[region_engine.mito.index]
aux_path = "/data/home/index"
metadata_cache_size = "512MiB"
content_cache_size = "3GiB"
